global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "twinforce-api"
    static_configs:
      - targets: ["api:3001"]
    metrics_path: /metrics

  - job_name: "twinforce-ai"
    static_configs:
      - targets: ["ai:8000"]
    metrics_path: /metrics

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
