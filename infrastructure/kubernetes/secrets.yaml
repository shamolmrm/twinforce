# Apply with: kubectl apply -f secrets.yaml
# In production, use External Secrets Operator or AWS Secrets Manager
apiVersion: v1
kind: Secret
metadata:
  name: twinforce-secrets
  namespace: twinforce
type: Opaque
stringData:
  # Copy values from .env — DO NOT commit real secrets
  DATABASE_URL: "postgresql://postgres:password@postgres-service:5432/twinforce"
  REDIS_URL: "redis://redis-service:6379"
  NATS_URL: "nats://nats-service:4222"
  JWT_SECRET: "REPLACE_WITH_REAL_SECRET"
  OPENAI_API_KEY: "REPLACE_WITH_REAL_KEY"
  ANTHROPIC_API_KEY: "REPLACE_WITH_REAL_KEY"
  STRIPE_SECRET_KEY: "REPLACE_WITH_REAL_KEY"
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_REAL_KEY"
  SUPABASE_URL: "REPLACE_WITH_REAL_URL"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_WITH_REAL_KEY"
  ENCRYPTION_KEY: "REPLACE_WITH_64_CHAR_HEX"
