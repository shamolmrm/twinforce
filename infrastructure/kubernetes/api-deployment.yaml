apiVersion: apps/v1
kind: Deployment
metadata:
  name: twinforce-api
  namespace: twinforce
  labels:
    app: twinforce-api
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: twinforce-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: twinforce-api
        version: "1.0.0"
    spec:
      containers:
        - name: api
          image: twinforce/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: twinforce-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: twinforce-api
---
apiVersion: v1
kind: Service
metadata:
  name: twinforce-api
  namespace: twinforce
spec:
  selector:
    app: twinforce-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: twinforce-api-hpa
  namespace: twinforce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: twinforce-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
