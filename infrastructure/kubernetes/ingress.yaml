apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twinforce-ingress
  namespace: twinforce
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.twinforce.ai
        - ai.twinforce.ai
      secretName: twinforce-tls
  rules:
    - host: api.twinforce.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: twinforce-api
                port:
                  number: 80
    - host: ai.twinforce.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: twinforce-ai
                port:
                  number: 80
