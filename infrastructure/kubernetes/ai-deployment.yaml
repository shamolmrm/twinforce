apiVersion: apps/v1
kind: Deployment
metadata:
  name: twinforce-ai
  namespace: twinforce
  labels:
    app: twinforce-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: twinforce-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: twinforce-ai
    spec:
      containers:
        - name: ai
          image: twinforce/ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: twinforce-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: twinforce-ai
  namespace: twinforce
spec:
  selector:
    app: twinforce-ai
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: twinforce-ai-hpa
  namespace: twinforce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: twinforce-ai
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
